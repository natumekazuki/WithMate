name: CI

on:
  pull_request:
    branches:
      - recreate
  push:
    branches:
      - recreate

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck and test
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Check formatting
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Probe runtime persistence
        run: npm run probe:runtime-persistence

      - name: Smoke compiled persistence
        run: npm run smoke:compiled-persistence
